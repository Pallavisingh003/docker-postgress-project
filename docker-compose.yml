version: "3.9"

services:

  database:
    build: ./database
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: Pallavidb
      POSTGRES_USER: pallavi_singh
      POSTGRES_PASSWORD: ruchiya08*
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assinet

  backend:
    build: ./backend
    container_name: backend_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres_db
      POSTGRES_DB: Pallavidb
      POSTGRES_USER: pallavi_singh
      POSTGRES_PASSWORD: ruchiya08*
    depends_on:
      - database
    networks:
      - assinet

volumes:
  postgres_data:

networks:
  assinet:
    external: true